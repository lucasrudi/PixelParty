name: Vercel Check

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - "vercel.deployment.*"

jobs:
  notify-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: notify vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - pixel-party: Vercel check"
